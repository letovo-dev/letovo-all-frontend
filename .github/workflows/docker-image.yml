name: build & push docker image to GHCR

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  pr-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan known container compromise IOCs in repository
        run: |
          set -euo pipefail
          ioc_regex="$(printf '%s|%s|%s|%s|%s' '176[.]65[.]139' 'bins[.]sh' 'drop''be' '/tmp/''x86' '/usr/bin/''sysd')"
          if grep -RInE "$ioc_regex" \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=.next \
            .; then
            echo 'Known compromise IOC found in repository content' >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for verification
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          load: true
          tags: letovo-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify local image runtime and IOCs
        run: |
          set -euo pipefail
          IMAGE=letovo-frontend:${{ github.sha }}
          test "$(docker image inspect "$IMAGE" --format '{{.Config.User}}')" = "node"
          docker run --rm --entrypoint='' "$IMAGE" sh -ec "$(printf '%s\n' \
            'test ! -e /usr/sbin/drop''be' \
            'test ! -e /tmp/''x86' \
            'test ! -e /usr/bin/''sysd' \
            'test ! -e /app/.npmrc' \
            'test ! -e /app/.env')"
          ioc_regex="$(printf '%s|%s|%s|%s|%s' '176[.]65[.]139' 'bins[.]sh' 'drop''be' '/tmp/''x86' '/usr/bin/''sysd')"
          docker run --rm --entrypoint='' "$IMAGE" sh -ec \
            "! grep -RInE '$ioc_regex' /app /usr/local/bin /usr/bin /usr/sbin /tmp 2>/dev/null"
          container_id="$(docker run -d -p 3000:3000 "$IMAGE")"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null && \
              docker inspect --format '{{.State.Health.Status}}' "$container_id" | grep -qx healthy; then
              exit 0
            fi
            sleep 2
          done
          docker inspect --format 'health={{.State.Health.Status}}' "$container_id" || true
          docker logs "$container_id"
          exit 1

  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan known container compromise IOCs in repository
        run: |
          set -euo pipefail
          ioc_regex="$(printf '%s|%s|%s|%s|%s' '176[.]65[.]139' 'bins[.]sh' 'drop''be' '/tmp/''x86' '/usr/bin/''sysd')"
          if grep -RInE "$ioc_regex" \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=.next \
            .; then
            echo 'Known compromise IOC found in repository content' >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/letovo-frontend:latest
            ghcr.io/${{ github.repository_owner }}/letovo-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-pull:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, inspect, run, and scan image
        run: |
          set -euo pipefail
          IMAGE=ghcr.io/${{ github.repository_owner }}/letovo-frontend:${{ github.sha }}
          docker pull "$IMAGE"
          test "$(docker image inspect "$IMAGE" --format '{{.Config.User}}')" = "node"
          docker run --rm --entrypoint='' "$IMAGE" sh -ec "$(printf '%s\n' \
            'test ! -e /usr/sbin/drop''be' \
            'test ! -e /tmp/''x86' \
            'test ! -e /usr/bin/''sysd' \
            'test ! -e /app/.npmrc' \
            'test ! -e /app/.env')"
          ioc_regex="$(printf '%s|%s|%s|%s|%s' '176[.]65[.]139' 'bins[.]sh' 'drop''be' '/tmp/''x86' '/usr/bin/''sysd')"
          docker run --rm --entrypoint='' "$IMAGE" sh -ec \
            "! grep -RInE '$ioc_regex' /app /usr/local/bin /usr/bin /usr/sbin /tmp 2>/dev/null"
          container_id="$(docker run -d -p 3000:3000 "$IMAGE")"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null && \
              docker inspect --format '{{.State.Health.Status}}' "$container_id" | grep -qx healthy; then
              exit 0
            fi
            sleep 2
          done
          docker inspect --format 'health={{.State.Health.Status}}' "$container_id" || true
          docker logs "$container_id"
          exit 1
