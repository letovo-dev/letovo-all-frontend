name: build & push docker image to GHCR

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan known container compromise IOCs
        run: |
          set -euo pipefail
          if grep -RInE '176\.65\.139|bins\.sh|dropbe|/tmp/x86|/usr/bin/sysd' \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude-dir=node_modules \
            --exclude-dir=.next \
            .; then
            echo 'Known compromise IOC found in repository content' >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/letovo-frontend:latest
            ghcr.io/${{ github.repository_owner }}/letovo-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-pull:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, inspect, and scan image
        run: |
          set -euo pipefail
          IMAGE=ghcr.io/${{ github.repository_owner }}/letovo-frontend:${{ github.sha }}
          docker pull "$IMAGE"
          docker image inspect "$IMAGE" >/dev/null
          docker run --rm --entrypoint='' "$IMAGE" sh -c \
            "! grep -RInE '176\\.65\\.139|bins\\.sh|dropbe|/tmp/x86|/usr/bin/sysd' /app 2>/dev/null"
